; =============================================================================
; Loki CYD — Autonomous Network Recon Virtual Pet
; PlatformIO Configuration for Cheap Yellow Display (ESP32)
; =============================================================================

[platformio]
src_dir = src

[env]
build_src_filter = +<*> -<tools/>

[env:esp32-cyd]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; CYD 2.8" uses CH340 USB-Serial
upload_port = /dev/cu.usbserial-*

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DUSER_SETUP_LOADED
    -include src/User_Setup.h
    -Wl,--allow-multiple-definition
    -DLOKI_VERSION="\"v0.1.0\""
    -DARP_TABLE_SIZE=255
    ; Theme animation timing (ms) — override per theme
    ; -DPET_ANIM_INTERVAL_MIN=1500
    ; -DPET_ANIM_INTERVAL_MAX=2000

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    ewpa/LibSSH-ESP32

; Partition scheme - need space for firmware + SPIFFS
board_build.partitions = huge_app.csv

; Flash mode
board_build.flash_mode = dio
board_build.f_flash = 40000000L

monitor_filters = esp32_exception_decoder

; =============================================================================
; QDtech E32R35T Build Target (3.5" ST7796 320x480)
; =============================================================================

[env:esp32-e32r35t]
extends = env:esp32-cyd
build_flags =
    ${env:esp32-cyd.build_flags}
    -DCYD_E32R35T=1
